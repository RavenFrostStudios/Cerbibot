tool_allowlist:
  - fetch_url
  - parse_text

tool_policies:
  fetch_url:
    max_calls_per_request: 2
    requires_human_approval: false
    allowed_arg_patterns:
      url: "^https://[A-Za-z0-9._~:/?#\\[\\]@!$&'()*+,;=%-]+$"
  parse_text:
    max_calls_per_request: 3
    requires_human_approval: false
    allowed_arg_patterns: {}

retrieval_policy:
  domain_allowlist:
    - docs.python.org
  domain_denylist:
    - localhost
    - 127.0.0.1
    - 169.254.169.254

high_impact_actions:
  - external_contact
  - file_write
  - credential_use
  - payment_transfer
